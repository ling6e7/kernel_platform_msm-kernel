name: Build Xiaomi 13 Native-KSU Kernel

on:
  workflow_dispatch:
    inputs:
      UPLOAD_NAME:
        description: '固件命名后缀'
        required: true
        default: 'Fuxi-Native-KSU'

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4
      with:
        ref: staging-lineage-2
        fetch-depth: 1
  
    - name: 2. 安装基础依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev lib32ncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip python3-dev device-tree-compiler jq libfuse2

    - name: 3. 清理环境并注入官方 KernelSU
      run: |
        echo "=== 正在清理源码中的旧 KSU 引用 ==="
        # 1. 先把源码里硬编码的 KSU 引用删掉，防止 setup.sh 重复添加或报错
        sed -i '/kernelsu\/Kconfig/d' drivers/Kconfig
        sed -i '/kernelsu/d' drivers/Makefile
        
        # 2. 绕过 build.sh 的 submodule 更新
        sed -i 's/git submodule init && git submodule update/echo "Skipping broken submodule update"/' build.sh
        
        echo "=== 正在注入官方 KernelSU ==="
        # 3. 移除可能存在的残留文件夹
        rm -rf KernelSU
        
        # 4. 使用官方脚本一键集成
        # 这会自动下载最新源码，并正确修改 drivers/Kconfig 和 Makefile
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        
        echo "✅ KernelSU Native 模式准备就绪"

    - name: 4. 强制修改内核配置 (Root 核心开关)
      run: |
        echo "=== 正在强制修改 Defconfig ==="
        
        # 自动寻找配置文件
        DEFCONFIG=$(find arch/arm64/configs -name "*fuxi_defconfig" | head -n 1)
        if [ -z "$DEFCONFIG" ]; then DEFCONFIG="arch/arm64/configs/vendor/fuxi_defconfig"; fi
        echo "目标配置文件: $DEFCONFIG"
        
        # 1. 清理可能冲突的配置
        sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
        sed -i '/CONFIG_HAVE_KPROBES/d' $DEFCONFIG
        sed -i '/CONFIG_KSU/d' $DEFCONFIG
        sed -i '/CONFIG_OVERLAY_FS/d' $DEFCONFIG
        
        # 2. 写入 Native 模式所需的黄金配置
        cat <<EOT >> $DEFCONFIG
        # 开启 Kprobes (Root 必须)
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        # 开启 Native 模式 (直接集成，无需修补镜像)
        CONFIG_KSU=y
        # 模块挂载支持
        CONFIG_OVERLAY_FS=y
        EOT
        
        echo "=== 配置文件修改完成 ==="
        tail -n 10 $DEFCONFIG

    - name: 5. 设置 Java 17 (Re-Kernel)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 6. 集成 Re-Kernel
      run: |
        ASSET_URL=$(curl -s https://api.github.com/repos/Sakion-Team/Re-Kernel/releases/tags/modifier | jq -r '.assets[0].browser_download_url')
        wget $ASSET_URL -O KernelModifier.jar
        java -jar KernelModifier.jar     
   
    - name: 7. 准备编译器
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
        chmod +x antman
        ./antman -S
        
    - name: 8. 执行编译
      run: |
        export PATH=$(pwd)/toolchains/clang/bin:$PATH
        chmod +x build.sh
        echo "=== 开始编译 ==="
        bash build.sh

    - name: 9. 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-${{ inputs.UPLOAD_NAME }}
        path: |
          out/arch/arm64/boot/Image
          AnyKernel3/*.zip
