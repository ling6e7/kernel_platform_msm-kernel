name: Build Xiaomi 13 Fuxi LKM-Ready Kernel (SukiSU Ultra)

on:
  workflow_dispatch:
    inputs:
      UPLOAD_NAME:
        description: '固件命名后缀'
        required: true
        default: 'Fuxi-LKM-SukiSU-Ultra'

jobs:
  build:
    runs-on: ubuntu-24.04
   
    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4
      with:
        ref: staging-lineage-2
        fetch-depth: 1
        submodules: recursive   # 重要：拉取 KernelSU 子模块

    - name: 2. 安装基础依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev lib32ncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip python3-dev device-tree-compiler jq libfuse2

    - name: 3. 🔥 清理旧 KSU 冲突并切换到 SukiSU-Ultra 🔥
      run: |
        echo "清理原有 KernelSU 子模块冲突..."
        rm -rf KernelSU drivers/kernelsu 2>/dev/null || true
        sed -i '/kernelsu\/Kconfig/d' drivers/Kconfig 2>/dev/null || true
        sed -i '/kernelsu/d' drivers/Makefile 2>/dev/null || true
        sed -i 's/git submodule init && git submodule update/echo "Skipping submodule update"/' build.sh 2>/dev/null || true
        echo "✅ 旧 KSU 已清理"

    - name: 4. 强制开启 LKM + SukiSU 必要配置
      run: |
        echo "修改 fuxi_defconfig 支持 LKM..."
        DEFCONFIG="arch/arm64/configs/fuxi_defconfig"
       
        sed -i '/CONFIG_KSU/d' $DEFCONFIG
        sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
        sed -i '/CONFIG_HAVE_KPROBES/d' $DEFCONFIG
        sed -i '/CONFIG_OVERLAY_FS/d' $DEFCONFIG
        sed -i '/CONFIG_KALLSYMS/d' $DEFCONFIG
       
        cat <<EOT >> $DEFCONFIG
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_OVERLAY_FS=y
        CONFIG_MODULES=y
        CONFIG_KALLSYMS=y
        CONFIG_KALLSYMS_ALL=y
        CONFIG_KPM=y
        EOT
       
        echo "=== defconfig 修改完成 ==="
        tail -n 20 $DEFCONFIG

    - name: 5. 集成最新 SukiSU-Ultra (LKM 模式)
      run: |
        echo "集成 SukiSU-Ultra 最新版..."
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main 1
        echo "✅ SukiSU-Ultra 集成完成"

    - name: 6. 设置 Java 17 (Re-Kernel 可选)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 7. (可选) 运行 Re-Kernel Modifier
      run: |
        ASSET_URL=$(curl -s https://api.github.com/repos/Sakion-Team/Re-Kernel/releases/tags/modifier | jq -r '.assets[0].browser_download_url' || echo "")
        if [ -n "$ASSET_URL" ]; then
          wget "$ASSET_URL" -O KernelModifier.jar && java -jar KernelModifier.jar || echo "Re-Kernel 跳过"
        fi

    - name: 8. 准备 Neutron Clang 编译器
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
        chmod +x antman
        ./antman -S

    - name: 9. 执行编译
      run: |
        export PATH=$(pwd)/toolchains/clang/bin:$PATH
        chmod +x build.sh
        bash build.sh   # 如果 build.sh 需要额外参数，可在此添加

    - name: 10. 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-${{ inputs.UPLOAD_NAME }}
        path: |
          out/arch/arm64/boot/Image
          AnyKernel3/*.zip
