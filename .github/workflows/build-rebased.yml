name: Build Xiaomi 13 Rebased Kernel

on:
  workflow_dispatch:
    inputs:
      UPLOAD_NAME:
        description: '固件命名后缀'
        required: true
        default: 'Fuxi-Rebased'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: 1. 拉取代码 (指定分支 staging-lineage-2)
      uses: actions/checkout@v4
      with:
        ref: staging-lineage-2
        fetch-depth: 1
  
    - name: 2. 安装基础依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip python3-dev device-tree-compiler jq

    # === 关键修改：使用官方插件设置 Java 17 ===
    - name: 3. 设置 Java 17 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. 自动集成 Re-Kernel
      run: |
        echo "自动获取并下载最新的 Modifier.jar"
        ASSET_URL=$(curl -s https://api.github.com/repos/Sakion-Team/Re-Kernel/releases/tags/modifier | jq -r '.assets[0].browser_download_url')
        wget $ASSET_URL -O KernelModifier.jar
        
        echo "运行内核修改器注入代码..."
        # 此时 java 命令已经是 Java 17 了
        java -jar KernelModifier.jar     
   
    - name: 5. 准备编译器
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
        chmod +x antman
        ./antman -S
        
    - name: 6. 执行一键编译脚本
      run: |
        export PATH=$(pwd)/toolchains/clang/bin:$PATH
        chmod +x build.sh
        echo "=== 开始运行 build.sh ==="
        bash build.sh

    - name: 7. 搜集并上传产物
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-${{ inputs.UPLOAD_NAME }}
        path: |
          *.zip
          out/*.zip
          AnyKernel3/*.zip
          out/arch/arm64/boot/Image
