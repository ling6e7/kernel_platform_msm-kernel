name: Build Xiaomi 13 Fuxi LKM-Ready Kernel (SukiSU Ultra - Builtin)005

on:
  workflow_dispatch:
    inputs:
      UPLOAD_NAME:
        description: '固件命名后缀'
        required: true
        default: 'Fuxi-LKM-SukiSU-Builtin'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 1. 拉取代码（跳过子模块）
        uses: actions/checkout@v4
        with:
          ref: staging-lineage-2
          fetch-depth: 1
          submodules: false

      - name: 2. 下载 Android 优化的 Clang 编译器 (ZyC-Clang)
        run: |
          echo "开始克隆 Clang 编译器..."
          mkdir -p toolchains
          # 使用 ZyC-Clang 17 (针对较新 Android 内核兼容性极佳)
          git clone --depth=1 https://github.com/ZyC-Project/ZyC-Clang.git toolchains/clang
          echo "✅ 编译器下载完成"

      - name: 3. 安装基础依赖
        run: |
          sudo apt-get update
          # 补全了 clang 和 llvm 基础包，以防万一
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev lib32ncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip python3-dev device-tree-compiler jq libfuse2 lld clang llvm

      - name: 4. 🔥 终极清理 + 重写 build.sh
        run: |
          echo "=== 终极清理开始 ==="
          rm -f .gitmodules
          rm -rf KernelSU drivers/kernelsu .git/modules/KernelSU 2>/dev/null || true
          sed -i '/kernelsu/d' drivers/Kconfig 2>/dev/null || true
          sed -i '/source.*kernelsu/d' drivers/Kconfig 2>/dev/null || true
          sed -i '/kernelsu/d' drivers/Makefile 2>/dev/null || true

          # 逐行写入 build.sh
          cat > build.sh << 'EOF'
          export ARCH=arm64
          export SUBARCH=arm64
          export TARGET_PRODUCT=fuxi

          echo "Submodule skipped by workflow"

          # 确保使用刚下载的 clang
          export PATH=$(pwd)/toolchains/clang/bin:$PATH

          MAKE_PARAMS="LLVM=1 LLVM_IAS=1 O=out"
          make $MAKE_PARAMS fuxi_defconfig -j$(nproc --all)
          make $MAKE_PARAMS Image -j$(nproc --all)

          if [ $? -ne 0 ]; then
              exit 1
          fi

          rm -r out/AnyKernel3 2>/dev/null || true
          cp -r AnyKernel3 out/
          cp out/arch/arm64/boot/Image out/AnyKernel3/Image
          cd out/AnyKernel3
          zip -r9 fuxi-$(/bin/date -u '+%Y%m%d-%H%M').zip .
          EOF

          chmod +x build.sh
          echo "✅ build.sh 已重写完成"

      - name: 5. 强制开启 LKM + SukiSU 必要配置
        run: |
          echo "修改 fuxi_defconfig..."
          DEFCONFIG="arch/arm64/configs/fuxi_defconfig"
          sed -i '/CONFIG_KSU/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_HAVE_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_OVERLAY_FS/d' $DEFCONFIG
          sed -i '/CONFIG_KALLSYMS/d' $DEFCONFIG
          
          echo "CONFIG_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
          echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
          echo "CONFIG_MODULES=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG
          echo "CONFIG_KPM=y" >> $DEFCONFIG
          
          echo "=== defconfig 修改完成 ==="
          tail -n 20 $DEFCONFIG

      - name: 6. 集成 SukiSU-Ultra Builtin 模式
        run: |
          echo "集成 SukiSU-Ultra Builtin 最新版..."
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin 1
          echo "✅ SukiSU-Ultra Builtin 集成完成"

      - name: 7. 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 8. 执行编译 + 最终检查
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$PATH
          
          # 编译前校验一下编译器是否就绪
          echo "编译器版本检查："
          clang --version || echo "⚠️ Clang 未找到，但将继续尝试..."
          
          bash build.sh
          
          echo "=== 最终检查 Image 中 SukiSU 痕迹 ==="
          strings out/arch/arm64/boot/Image | grep -iE "suki|ksu|kpm" | head -30 || echo "警告：Image 中完全没有 SukiSU 字符串！集成失败"

      - name: 9. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ inputs.UPLOAD_NAME }}
          path: |
            out/arch/arm64/boot/Image
            out/AnyKernel3/*.zip
