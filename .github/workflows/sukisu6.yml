name: Build Xiaomi 13 Fuxi Kernel (Source Built-in KSU)

on:
  workflow_dispatch:
    inputs:
      UPLOAD_NAME:
        description: '固件命名后缀'
        required: true
        default: 'Fuxi-Builtin-Native-KSU'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          ref: staging-lineage-2
          fetch-depth: 1
          submodules: false # 必须关掉！不让 Git 自动去找那个删掉的 commit

      - name: 2. ⚡ 手动修复 KernelSU 子模块
        run: |
          echo "手动拉取作者定制的 KernelSU..."
          # 删除可能存在的空目录，防止冲突
          rm -rf KernelSU drivers/kernelsu 2>/dev/null || true
          
          # 直接克隆作者指定的仓库的最新代码（绕过那个丢失的历史 commit）
          git clone --depth=1 https://github.com/xiaomi-sm8550-kernel/KernelSU.git drivers/kernelsu
          
          # 做个软链接，防止某些构建脚本找根目录的 KernelSU
          ln -sf drivers/kernelsu KernelSU
          echo "✅ 定制版 KernelSU 源码补齐完成"

      - name: 3. 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev lib32ncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip python3-dev device-tree-compiler jq libfuse2 lld

      - name: 4. 获取 Neutron Clang
        run: |
          echo "使用 Neutron Clang..."
          mkdir -p toolchains/clang
          cd toolchains/clang
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "✅ Neutron Clang 安装完成"

      - name: 5. 编写编译脚本 build.sh
        run: |
          cat > build.sh << 'EOF'
          export ARCH=arm64
          export SUBARCH=arm64
          export TARGET_PRODUCT=fuxi

          export PATH=$(pwd)/toolchains/clang/bin:$PATH

          MAKE_PARAMS="LLVM=1 LLVM_IAS=1 O=out"
          make $MAKE_PARAMS fuxi_defconfig -j$(nproc --all)
          make $MAKE_PARAMS Image -j$(nproc --all)

          if [ $? -ne 0 ]; then
              exit 1
          fi

          rm -r out/AnyKernel3 2>/dev/null || true
          cp -r AnyKernel3 out/ 2>/dev/null || echo "跳过 AnyKernel3 复制"
          cp out/arch/arm64/boot/Image out/AnyKernel3/Image 2>/dev/null || true
          cd out/AnyKernel3 || exit 0
          zip -r9 fuxi-$(/bin/date -u '+%Y%m%d-%H%M').zip .
          EOF
          chmod +x build.sh

      - name: 6. 确保激活源码内置的 KSU 与底层支持
        run: |
          echo "修改 fuxi_defconfig..."
          DEFCONFIG="arch/arm64/configs/fuxi_defconfig"
          
          sed -i '/CONFIG_KSU/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_HAVE_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_OVERLAY_FS/d' $DEFCONFIG
          sed -i '/CONFIG_KALLSYMS/d' $DEFCONFIG
          
          echo "CONFIG_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
          echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG
          
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
          
          echo "=== defconfig 修改完成 ==="

      - name: 7. 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 8. 执行编译 + 最终检查
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$PATH
          bash build.sh
          
          echo "=== 检查 Image 中内置 KSU/SUSFS 痕迹 ==="
          strings out/arch/arm64/boot/Image | grep -iE "ksu|susfs" | head -30 || echo "警告：Image 中未检测到 KSU 字符串！"

      - name: 9. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ inputs.UPLOAD_NAME }}
          path: |
            out/arch/arm64/boot/Image
            out/AnyKernel3/*.zip
